{% extends "base.html" %}
{% block title %}Прогресс ребёнка{% endblock %}

{% block content %}
<h2 class="mb-3">Прогресс ребёнка</h2>

<table class="table table-hover">
  <thead>
    <tr>
      <th>Курс</th>
      <th>%</th>
      <th>Результат</th>
    </tr>
  </thead>
  <tbody>
    {% for p in items %}
      <tr>
        <td>{{ p.course.name }}</td>
        <td>{{ p.completion_percent }}%</td>
        <td>{{ p.result }}</td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
