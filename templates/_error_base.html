{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block page_title %}Ошибка{% endblock %} — EduPlatform</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #7748FF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* blobs */
    .blob { position: fixed; border-radius: 50%; background: #fff; pointer-events: none; }
    .blob-1 { width: 500px; height: 500px; top: -120px; left: -160px; opacity: .08; }
    .blob-2 { width: 380px; height: 380px; bottom: -100px; right: -120px; opacity: .07; }
    .blob-3 { width: 220px; height: 220px; bottom: 20%; left: 5%;   opacity: .05; }

    /* card */
    .err-card {
      background: #fff;
      border-radius: 28px;
      padding: 3.5rem 3.5rem 3rem;
      max-width: 520px;
      width: 90%;
      text-align: center;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 80px rgba(20, 0, 80, .22);
      animation: popIn .35s cubic-bezier(.34, 1.56, .64, 1) both;
    }
    @keyframes popIn {
      from { transform: scale(.88) translateY(20px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);    opacity: 1; }
    }

    /* code */
    .err-code {
      font-size: 7rem;
      font-weight: 800;
      line-height: 1;
      color: {% block accent_color %}#7748FF{% endblock %};
      letter-spacing: -.04em;
      display: inline-block;
    }
    .err-code::after {
      content: '';
      display: block;
      width: 56px;
      height: 5px;
      background: linear-gradient(90deg, {% block accent_color2 %}#7748FF{% endblock %}, {% block accent_color3 %}#a78bff{% endblock %});
      border-radius: 3px;
      margin: .5rem auto 0;
    }

    /* icon */
    .err-icon {
      width: 72px; height: 72px; border-radius: 20px;
      background: {% block icon_bg %}linear-gradient(135deg, #7748FF, #a78bff){% endblock %};
      display: flex; align-items: center; justify-content: center;
      margin: 1.5rem auto 1.3rem;
      font-size: 2rem; color: #fff;
      box-shadow: {% block icon_shadow %}0 8px 24px rgba(119,72,255,.35){% endblock %};
    }

    .err-title {
      font-size: 1.45rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: .5rem;
    }
    .err-sub {
      font-size: .9rem;
      color: #999;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    /* buttons */
    .btn-row { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }
    .btn-home {
      display: inline-flex; align-items: center; gap: .45rem;
      background: #7748FF; color: #fff;
      padding: .7rem 1.8rem; border-radius: 14px;
      font-size: .95rem; font-weight: 700;
      text-decoration: none; font-family: 'Poppins', sans-serif;
      transition: background .2s, transform .15s;
    }
    .btn-home:hover { background: #5c2ee0; color: #fff; transform: translateY(-1px); }
    .btn-back {
      display: inline-flex; align-items: center; gap: .45rem;
      background: #f3eeff; color: #7748FF;
      padding: .7rem 1.6rem; border-radius: 14px;
      font-size: .95rem; font-weight: 700;
      text-decoration: none; font-family: 'Poppins', sans-serif;
      border: none; cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .btn-back:hover { background: #ede9fe; transform: translateY(-1px); }

    /* logo */
    .logo-top {
      position: fixed; top: 1.8rem; left: 50%; transform: translateX(-50%);
      color: #fff; font-weight: 800; font-size: 1.5rem;
      text-decoration: none; z-index: 10; white-space: nowrap; opacity: .9;
    }
    .logo-top:hover { opacity: 1; color: #fff; }

    @media (max-width: 480px) {
      .err-card { padding: 2.5rem 1.8rem 2rem; }
      .err-code  { font-size: 5.5rem; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <a href="/" class="logo-top">EduPlatform</a>

  <div class="err-card">
    <div class="err-code">{% block error_code %}???{% endblock %}</div>

    <div class="err-icon">
      <i class="bi {% block error_icon %}bi-question-circle{% endblock %}"></i>
    </div>

    <div class="err-title">{% block error_title %}Что-то пошло не так{% endblock %}</div>
    <p class="err-sub">{% block error_desc %}Произошла неизвестная ошибка.{% endblock %}</p>

    <div class="btn-row">
      {% block buttons %}
      <button class="btn-back" onclick="history.back()">
        <i class="bi bi-arrow-left"></i> Назад
      </button>
      <a href="/" class="btn-home">
        <i class="bi bi-house-fill"></i> На главную
      </a>
      {% endblock %}
    </div>
  </div>
</body>
</html>
