{% extends "base.html" %}
{% block title %}Расписание{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-3">
  <h2>Расписание занятий</h2>
  <a href="{% url 'schedule_create' %}" class="btn btn-success">
    + Добавить занятие
  </a>
</div>

<table class="table table-striped table-hover">
  <thead>
    <tr>
      <th>Курс</th>
      <th>Дата</th>
      <th>Время</th>
      <th>Формат</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for s in items %}
      <tr>
        <td>{{ s.course.name }}</td>
        <td>{{ s.date }}</td>
        <td>{{ s.start_time }} – {{ s.end_time }}</td>
        <td>{{ s.lesson_format }}</td>
        <td class="text-end">
          <a href="{% url 'schedule_edit' s.id %}" class="btn btn-sm btn-outline-secondary">✏️</a>
          <a href="{% url 'schedule_delete' s.id %}" class="btn btn-sm btn-outline-danger">🗑</a>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
