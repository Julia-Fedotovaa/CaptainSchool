{% extends "base.html" %}
{% block title %}Курсы{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-3">
  <h2>Курсы</h2>
  <a href="{% url 'course_create' %}" class="btn btn-success form btn-lg">+ Добавить курс</a>
</div>

<table class="table table-striped table-hover">
  <thead class="table-light">
    <tr>
      <th>Название</th>
      <th>Трек</th>
      <th>Формат</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for c in courses %}
    <tr>
      <td>{{ c.name }}</td>
      <td>{{ c.track.name }}</td>
      <td>{{ c.format }}</td>
      <td class="text-end">
        <a href="{% url 'course_edit' c.pk %}" class="btn btn-sm btn-outline-secondary">✏️</a>
        <a href="{% url 'course_delete' c.pk %}" class="btn btn-sm btn-outline-danger">🗑</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
