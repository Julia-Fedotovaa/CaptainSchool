{% extends "base.html" %}
{% block title %}Доступные курсы{% endblock %}

{% block content %}
<h2 class="mb-3">Доступные курсы</h2>

<table class="table table-hover">
  <thead>
    <tr>
      <th>Название</th>
      <th>Трек</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for c in courses %}
    <tr>
      <td>{{ c.name }}</td>
      <td>{{ c.track.name }}</td>
      <td class="text-end">
        <a href="{% url 'enroll_course' c.id %}" class="btn btn-success btn-sm">
          Записаться
        </a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
